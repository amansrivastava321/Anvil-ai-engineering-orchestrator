# Development environment configuration
environment: development
debug: true
host: 0.0.0.0
port: 8008
workers: 1

ollama:
  base_url: http://localhost:11434
  timeout: 120
  max_retries: 3
  default_model: qwen2.5-coder:7b

logging:
  level: INFO
  format: json

artifacts:
  base_path: data/artifacts

memory:
  base_path: data/memory

performance_db:
  base_path: data/performance_db
